
<div *ngIf="!isLoading && tasks.length === 0"
     class="card shadow-sm">
  <div class="card-body text-center py-5">
    <h2 class="h5">No tasks yet</h2>
    <p class="text-muted">
      Create your first task to start tracking your work.
    </p>

    <a routerLink="/tasks/new" class="btn btn-primary">
      Create Task
    </a>
  </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="h3 mb-1">My Tasks</h1>
  </div>

  <a routerLink="/tasks/new" class="btn btn-primary">
    <i class="bi bi-plus-circle me-1"></i>
    New Task
  </a>
</div>

<div *ngIf="errorMessage"
     class="alert alert-danger"
     role="alert">
  {{ errorMessage }}
</div>

<div *ngIf="isLoading"
     class="alert alert-info"
     role="alert">
  Loading tasks...
</div>

<div class="card shadow-sm mb-3">
  <div class="card-body">
    <div class="d-flex flex-wrap align-items-center gap-2">
      <span class="fw-semibold me-2">
        Filter by status:
      </span>

      <button *ngFor="let status of statuses"
              type="button"
              class="btn btn-sm"
              [ngClass]="selectedStatus === status.value ? 'btn-primary' : 'btn-outline-primary'"
              (click)="filterByStatus(status.value)">
        {{ status.label }}
      </button>
    </div>
  </div>
</div>

<div *ngIf="!isLoading && tasks.length > 0"
     class="card shadow-sm">
  <div class="card-body">

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Task</th>
            <th>Status</th>
            <th>Due date</th>
            <th class="text-end"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let task of filteredTasks">
            <td>
              <div class="task-title-cell">
                <span class="fw-semibold">
                  {{ task.title }}
                </span>

                <span class="task-info-tooltip">
                  <i class="bi bi-info-circle text-primary"></i>

                  <span class="task-info-tooltip-text">
                    {{ task.description }}
                  </span>
                </span>
              </div>
            </td>

            <td>
              <span class="badge" [ngClass]="getStatusBadgeClass(task.status)">
                {{ getStatusLabel(task.status) }}
              </span>
            </td>

            <td>
              {{ task.dueDate | date:'yyyy-MM-dd' }}
            </td>

            <td class="text-end">
              <a [routerLink]="['/tasks/edit', task.id]"
                 class="btn btn-sm btn-outline-primary me-2"
                 title="Edit task"
                 aria-label="Edit task">
                <i class="bi bi-pencil"></i>
              </a>

              <button type="button"
                      class="btn btn-sm btn-outline-danger"
                      title="Delete task"
                      aria-label="Delete task"
                      (click)="deleteTask(task.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
